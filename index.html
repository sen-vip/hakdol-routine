const CHECK_ACTIVE_MONTH_KEY='hakdolRoutineActiveCheckMonth';
function pad(n){return String(n).padStart(2,'0')}
function currentMonthKey(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)}
const state={year:new Date().getFullYear(),month:localStorage.getItem(CHECK_ACTIVE_MONTH_KEY)||currentMonthKey(),cats:JSON.parse(localStorage.getItem('hakdol:v3:cats')||'[]'),seg:'today',q:'',sort:'date',remainingOnly:localStorage.getItem('hakdol:v3:remainingOnly')==='1'};
state.year=Number(state.month.split('-')[0])||state.year; localStorage.setItem(CHECK_ACTIVE_MONTH_KEY,state.month);
const segs=[{id:'early',label:'월초',range:'1~5일',color:'#22c55e',cls:'g'},{id:'ten',label:'10일 전후',range:'6~15일',color:'#ef4444',cls:'r'},{id:'mid',label:'중순',range:'16~20일',color:'#f59e0b',cls:'y'},{id:'end',label:'말일',range:'21일~말일',color:'#14b8a6',cls:'g'}];
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function monthLabel(key){const [y,m]=String(key).split('-');return `${y}년 ${Number(m)}월`}
function isMonthly(d){return d.period==='매월 반복'} function isCycle(d){return d.period==='분기/연간'} function isSituation(d){return d.period==='수시'}
function catList(){return [...new Set(DATA.map(d=>d.cat).filter(Boolean))]}
function dayNum(txt){txt=String(txt); if(txt.includes('초'))return 3;if(txt.includes('중순')||txt.includes('3째'))return 18;if(txt.includes('말')||txt.includes('25')||txt.includes('27')||txt.includes('홀수'))return 25;const m=txt.match(/(\d{1,2})\s*일/);return m?Number(m[1]):15}
function segmentOf(d){const n=dayNum(d.date);return n<=5?'early':n<=15?'ten':n<=20?'mid':'end'}
function todaySeg(){const now=new Date();if(state.month!==currentMonthKey())return '';const d=now.getDate();return d<=5?'early':d<=15?'ten':d<=20?'mid':'end'}
function monthlyBadgeLabel(d){const seg=segs.find(x=>x.id===segmentOf(d));return seg?seg.label:'월초'}
function niceDateLabel(d){const raw=String(d.date||'').trim();
 if(!raw)return '';
 if(raw==='매월 초')return '매월 초';
 return raw.replace(/매월(\d)/,'매월 $1').replace(/까지/g,'까지').replace(/일경/g,'일경').replace(/\s+/g,' ');
}
function cycleBadgeLabel(d){const raw=String(d.date||'').trim();
 const m=raw.match(/(\d+)년마다/); if(m)return `${m[1]}년마다`;
 if(raw.includes('분기'))return '분기별';
 if(raw.includes('반기'))return '반기별';
 if(raw.includes('연')){const n=raw.match(/연\s*(\d+)회/);return n?`연 ${n[1]}회`:'매년'}
 if(raw.includes('선임'))return '선임 후';
 return raw.replace(/1회|2회/g,'').replace(/시$/,' 시').replace(/\s+/g,' ').trim();
}
function situationBadgeLabel(d){const raw=String(d.date||'').trim();
 if(raw.includes('퇴직'))return '퇴직 시';
 if(raw.includes('채용'))return '채용 시';
 if(raw.includes('계약'))return '계약 시';
 if(raw.includes('사유'))return '사유 발생 시';
 if(raw.includes('공사'))return '공사 완료 시';
 if(raw.includes('인사이동'))return '인사이동 시';
 return raw.replace(/시$/,' 시').replace(/\s+/g,' ').trim();
}
function displayBadge(d){return isMonthly(d)?monthlyBadgeLabel(d):isCycle(d)?cycleBadgeLabel(d):situationBadgeLabel(d)}
function badgeStyle(d){if(isMonthly(d)){const s=segs.find(x=>x.id===segmentOf(d))||segs[0];return `color:${s.color};background:${s.color}12;border-color:${s.color}33`}
 if(isCycle(d))return 'color:#92400e;background:#fef3c7;border-color:#fde68a';
 return 'color:#7e22ce;background:#f3e8ff;border-color:#e9d5ff';
}
function checkedStorageKey(){return `hakdolRoutineChecked-${state.month}`} function readCheckedSet(){try{return new Set(JSON.parse(localStorage.getItem(checkedStorageKey())||'[]'))}catch(e){return new Set()}} function writeCheckedSet(set){localStorage.setItem(checkedStorageKey(),JSON.stringify([...set]))}
function userMemoKey(no){return `hakdolUserMemo-${no}`} function readMemo(no){return localStorage.getItem(userMemoKey(no))||''} function writeMemo(no,val){val.trim()?localStorage.setItem(userMemoKey(no),val):localStorage.removeItem(userMemoKey(no))}
function routineKey(d){return `${d.no}|${d.cat}|${d.date}|${d.task}`}
function baseMonthly(){let list=DATA.filter(isMonthly); if(state.cats.length)list=list.filter(d=>state.cats.includes(d.cat)); return list}
function counts(){const out={early:0,ten:0,mid:0,end:0};baseMonthly().forEach(d=>out[segmentOf(d)]++);return out}
function checkedFor(d){return readCheckedSet().has(routineKey(d))}
function completionStats(list=baseMonthly()){const total=list.length;const done=list.filter(checkedFor).length;const remain=total-done;const rate=total?Math.round(done/total*100):0;return {total,done,remain,rate}}
function segmentStats(id){const list=baseMonthly().filter(d=>segmentOf(d)===id);return completionStats(list)}
function filteredMonthly(){let list=baseMonthly(); if(state.seg && state.seg!=='all')list=list.filter(d=>segmentOf(d)===state.seg); if(state.q){const q=state.q.toLowerCase();list=list.filter(d=>[d.task,d.detail,d.memo,d.law,d.cat,readMemo(d.no)].join(' ').toLowerCase().includes(q))} if(state.remainingOnly)list=list.filter(d=>!checkedFor(d)); return sortList(list)}
function sortList(list){return [...list].sort((a,b)=>state.sort==='cat'?a.cat.localeCompare(b.cat,'ko')||dayNum(a.date)-dayNum(b.date):state.sort==='task'?a.task.localeCompare(b.task,'ko'):dayNum(a.date)-dayNum(b.date))}
function listFor(type){let list=DATA.filter(type==='cycle'?isCycle:isSituation); if(state.cats.length)list=list.filter(d=>state.cats.includes(d.cat)); if(state.q){const q=state.q.toLowerCase();list=list.filter(d=>[d.task,d.detail,d.memo,d.law,d.cat].join(' ').toLowerCase().includes(q))} return sortList(list)}
function densityColor(n){return n>=6?'#ef4444':n>=3?'#f59e0b':'#22c55e'}
function filterLabel(){return state.cats.length?state.cats.join(' · '):'전체업무'}
function busiestSeg(remaining=false){const src=baseMonthly().filter(d=>!remaining || !checkedFor(d));const arr=segs.map(s=>[s.id,src.filter(d=>segmentOf(d)===s.id).length]).sort((a,b)=>b[1]-a[1]);return arr[0]}
function briefing(){const max=busiestSeg(false);const label=segs.find(s=>s.id===max[0])?.label||'이번 달';const cats=baseMonthly().filter(d=>segmentOf(d)===max[0]).map(d=>d.cat);const top=[...new Set(cats)].slice(0,2).join('·')||'월별';const st=completionStats();return max[1]?`이번 달은 <b>${label}</b>에 ${top} 업무가 집중됩니다. 전체 ${st.total}건 중 ${st.done}건 완료, 남은 업무는 ${st.remain}건입니다.`:'선택한 담당업무의 이번 달 업무가 없습니다.'}
function coachText(){const st=completionStats();const cur=todaySeg();const curLabel=cur?(segs.find(s=>s.id===cur)?.label):'';const many=busiestSeg(true);const manyLabel=segs.find(s=>s.id===many[0])?.label||'이번 달';const undone=sortList(baseMonthly().filter(d=>!checkedFor(d))).slice(0,3).map(d=>d.task);const monthNow=state.month===currentMonthKey();let line1=`<b>${esc(filterLabel())}</b> 기준으로 보고 있어요.`;let line2=monthNow&&curLabel?`지금은 <b>${curLabel}</b> 업무 구간입니다.`:`선택한 <b>${monthLabel(state.month)}</b> 기준 업무 흐름입니다.`;let line3=`전체 ${st.total}건 중 ${st.done}건 완료, 남은 업무는 <b>${st.remain}건</b>이에요.`;let line4=st.remain?`남은 업무가 많은 구간은 <b>${manyLabel}</b>이고, 먼저 ${undone.map(esc).join(', ')} 업무를 확인해보세요.`:'이번 달 기준 남은 업무가 없습니다. 메모나 상황업무만 가볍게 확인하세요.';return `${line1}<br>${line2}<br>${line3}<br>${line4}`}
function savePrefs(){localStorage.setItem('hakdol:v3:cats',JSON.stringify(state.cats));localStorage.setItem('hakdol:v3:remainingOnly',state.remainingOnly?'1':'0');localStorage.setItem(CHECK_ACTIVE_MONTH_KEY,state.month)}
function renderSide(){const c=counts();const cats=catList();const st=completionStats();document.getElementById('side').innerHTML=`<section class="card side-card"><div class="side-title"><span>① 내 담당업무</span><small>복수 선택</small></div><div class="chips"><button class="chip ${!state.cats.length?'active':''}" data-cat="">전체 <span class="cnt">${DATA.filter(isMonthly).length}</span></button>${cats.map(cat=>`<button class="chip ${state.cats.includes(cat)?'active':''}" data-cat="${esc(cat)}">${esc(cat)} <span class="cnt">${DATA.filter(d=>isMonthly(d)&&d.cat===cat).length}</span></button>`).join('')}</div><div class="mini-muted">${esc(filterLabel())} 기준으로 다음 접속 때도 자동 복원돼요.</div></section><section class="card side-card"><div class="side-title"><span>② 월 선택</span></div><div class="month-head"><button id="prevYear">‹</button><div class="month-title">${state.year}년</div><button id="nextYear">›</button></div><div class="month-grid">${Array.from({length:12},(_,i)=>`<button class="month ${state.month===`${state.year}-${pad(i+1)}`?'active':''}" data-month="${state.year}-${pad(i+1)}">${i+1}월</button>`).join('')}</div></section><section class="card side-card"><div class="side-title"><span>③ 이번 달 요약</span><small>${st.rate}%</small></div>${segs.map(s=>{const ss=segmentStats(s.id);return `<div class="summary-row"><span><i class="dot" style="background:${s.color}"></i>${s.label}</span><b>${ss.done}/${ss.total}</b></div>`}).join('')}<div class="progress-wrap"><div class="progress-line"><div class="progress-fill" style="width:${st.rate}%"></div></div><div class="progress-text"><span>${st.done}건 완료</span><span>남은 업무 ${st.remain}건</span></div></div><button class="pill-btn" id="allSeg" style="width:100%;margin-top:12px">전체 업무 보기</button></section><section class="card side-card t-card"><div class="side-title"><span>④ 학돌T 업무코치</span><small>💡</small></div><p class="coach-note">${coachText()}</p></section>`;
 document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{const v=b.dataset.cat;if(!v)state.cats=[];else state.cats=state.cats.includes(v)?state.cats.filter(x=>x!==v):[...state.cats,v];savePrefs();render()});document.getElementById('prevYear').onclick=()=>{state.year--;renderSide()};document.getElementById('nextYear').onclick=()=>{state.year++;renderSide()};document.querySelectorAll('[data-month]').forEach(b=>b.onclick=()=>{state.month=b.dataset.month;state.year=Number(state.month.split('-')[0]);if(state.seg==='today')state.seg=todaySeg()||'early';savePrefs();render()});document.getElementById('allSeg').onclick=()=>{state.seg='all';renderTimeline();renderMonthly()}}
function renderTimeline(){if(state.seg==='today')state.seg=todaySeg()||'early';const c=counts();const today=todaySeg();const list=filteredMonthly();const st=completionStats();document.getElementById('timeline').innerHTML=`<div class="page-head"><div><div class="title">${monthLabel(state.month)} 타임라인 <small>(${esc(filterLabel())} 기준 · ${st.total}건 중 ${st.done}건 완료)</small></div><div class="mini-muted">남은 업무 ${st.remain}건 · 완료율 ${st.rate}%</div></div><div class="density"><span><i class="dot" style="background:#22c55e"></i>업무 적음</span><span><i class="dot" style="background:#f59e0b"></i>보통</span><span><i class="dot" style="background:#ef4444"></i>많음</span></div></div><div class="timeline">${segs.map(s=>{const ss=segmentStats(s.id);return `<button class="step ${state.seg===s.id?'active':''} ${today===s.id?'today':''}" data-seg="${s.id}" style="color:${densityColor(c[s.id])}"><span class="step-bg"></span><span class="step-label">${s.label}</span><span class="step-range">${s.range}</span><span class="line-area"><span class="seg" style="background:${densityColor(c[s.id])}"></span><span class="node"></span><span class="today-label">TODAY</span></span><span class="count" style="color:${densityColor(c[s.id])}">${c[s.id]}건</span><span class="seg-stat">${ss.done}/${ss.total} 완료</span></button>`}).join('')}</div><div class="brief"><strong>💡 이번 달 한 줄 브리핑</strong><br>${briefing()}<div class="mini-list-chip">${list.slice(0,4).map(d=>`<span class="mini-chip">• ${esc(d.task)}</span>`).join('')}${list.length>4?`<span class="mini-chip">+ ${list.length-4}건 더보기</span>`:''}</div></div>`;document.querySelectorAll('[data-seg]').forEach(b=>b.onclick=()=>{state.seg=b.dataset.seg;renderTimeline();renderMonthly()})}
function renderMonthly(){const list=filteredMonthly();const st=completionStats(baseMonthly().filter(d=>!state.seg||state.seg==='all'?true:segmentOf(d)===state.seg));document.getElementById('monthly').innerHTML=`<div class="section-head"><div class="section-title">${monthLabel(state.month)} 업무 목록 <span class="count-badge">${state.remainingOnly?'남은 업무 ':''}${list.length}건</span><span class="done-soft">${st.done}/${st.total} 완료 · ${st.remain}건 남음</span></div><div class="filterbar"><div class="view-toggle"><button class="${!state.remainingOnly?'active':''}" data-remain="0">전체 보기</button><button class="${state.remainingOnly?'active':''}" data-remain="1">남은 업무만</button></div><input id="search" value="${esc(state.q)}" placeholder="업무명·상세내용·메모 검색"><select id="sort"><option value="date">일정 빠른 순</option><option value="cat">업무분장 순</option><option value="task">업무명 순</option></select></div></div><div class="chips" style="margin-bottom:12px"><button class="chip ${state.seg==='all'?'active':''}" data-seg2="all">전체</button>${segs.map(s=>`<button class="chip ${state.seg===s.id?'active':''}" data-seg2="${s.id}">${s.label} (${counts()[s.id]})</button>`).join('')}</div>${renderRows(list)}`;document.getElementById('search').oninput=e=>{state.q=e.target.value;renderMonthly();renderOther()};document.getElementById('sort').value=state.sort;document.getElementById('sort').onchange=e=>{state.sort=e.target.value;renderMonthly();renderOther()};document.querySelectorAll('[data-remain]').forEach(b=>b.onclick=()=>{state.remainingOnly=b.dataset.remain==='1';savePrefs();render()});document.querySelectorAll('[data-seg2]').forEach(b=>b.onclick=()=>{state.seg=b.dataset.seg2;renderTimeline();renderMonthly()});bindRows()}
function renderRows(list){if(!list.length)return '<div class="empty">조건에 맞는 업무가 없습니다.</div>';return `<div class="table"><div class="thead"><div></div><div>시기</div><div>업무명</div><div>관련업무</div><div></div></div>${list.map(rowHtml).join('')}</div>`}
function manualListFor(d){const arr=[];const t=d.task||'', detail=d.detail||'';if(t.includes('급여')||d.cat==='급여')arr.push('대상자와 변동사항을 먼저 확인하기','나이스 또는 관련 시스템 자료 확인하기','공제·신고·지급 누락 여부 확인하기');else if(d.cat==='시설')arr.push('점검 또는 선임 대상 여부 확인하기','업체·담당부서 일정 확인하기','결과보고 또는 증빙자료 보관하기');else if(d.cat==='지출')arr.push('청구서와 계약·검수 자료 확인하기','지급기한과 자동이체 여부 확인하기','에듀파인 지출 처리 상태 확인하기');else if(d.cat==='세입')arr.push('수입 발생 자료 확인하기','징수·수납 처리 여부 확인하기','증빙자료 정리하기');else arr.push('처리 대상 여부 확인하기','기한과 담당부서 확인하기','증빙자료를 정리하기');return arr}
function checkListFor(d){const arr=[];if(d.date)arr.push(`${niceDateLabel(d)} 기준 처리 여부`);if(d.dept)arr.push(`문의/안내부서: ${d.dept}`);arr.push('결재·보고·증빙 누락 여부');return arr}
function manualSection(title,body){if(!body||(Array.isArray(body)&&!body.length))return '';if(Array.isArray(body))return `<div class="manual-section"><div class="manual-title">${title}</div><ul class="manual-list">${body.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`;return `<div class="manual-section"><div class="manual-title">${title}</div><div class="manual-body">${esc(body)}</div></div>`}
function rowHtml(d){const checked=readCheckedSet().has(routineKey(d));const hasMemo=!!readMemo(d.no).trim();const desc=[d.detail||'', niceDateLabel(d)].filter(Boolean).join(' · ');return `<article class="row ${checked?'done':''}"><div class="row-main"><div><input class="check" type="checkbox" data-check="${esc(routineKey(d))}" ${checked?'checked':''}></div><div class="time-wrap"><span class="time-badge" style="${badgeStyle(d)}">${esc(displayBadge(d))}</span></div><div class="task-wrap"><div class="task-name">${esc(d.task)}${hasMemo?'<span class="memo-dot" title="메모 있음"></span>':''}</div><div class="task-desc">${esc(desc)}</div></div><div class="cat-wrap"><span class="cat-badge">${esc(d.cat)}</span></div><button class="expand" data-open>⌄</button></div><div class="detail"><div></div><div class="detail-box">${manualSection('업무 설명',d.detail||niceDateLabel(d))}${manualSection('해야 할 일',manualListFor(d))}${manualSection('확인할 것',checkListFor(d))}${manualSection('관련 법령',d.law)}${manualSection('참고사항',d.memo)}<div class="manual-section manual-memo"><div class="manual-title">내 메모</div><textarea data-memo="${d.no}" placeholder="내 메모를 남겨두세요">${esc(readMemo(d.no))}</textarea></div></div></div></article>`}
function bindRows(){document.querySelectorAll('[data-open]').forEach(b=>b.onclick=e=>{e.preventDefault();b.closest('.row').classList.toggle('open')});document.querySelectorAll('[data-check]').forEach(c=>c.onchange=()=>{const set=readCheckedSet();c.checked?set.add(c.dataset.check):set.delete(c.dataset.check);writeCheckedSet(set);c.closest('.row').classList.toggle('done',c.checked);renderSide();renderTimeline();renderMonthly()});document.querySelectorAll('[data-memo]').forEach(t=>t.oninput=()=>writeMemo(t.dataset.memo,t.value))}
function renderOther(){const cy=listFor('cycle').slice(0,5),si=listFor('situation').slice(0,5);document.getElementById('cycle').innerHTML=`<div class="section-head"><div class="section-title">다른 관련 주기업무</div><button class="memo-btn" data-more="cycle">전체 보기</button></div><div class="mini-list">${cy.map((d,i)=>miniHtml(d,i)).join('')}</div>`;document.getElementById('situation').innerHTML=`<div class="section-head"><div class="section-title">관련 상황업무</div><button class="memo-btn" data-more="situation">전체 보기</button></div><div class="situation-list">${si.map((d,i)=>situationHtml(d,i)).join('')}</div>`;document.querySelectorAll('[data-more]').forEach(b=>b.onclick=()=>showMore(b.dataset.more))}
function miniHtml(d,i){const cls=i%3===1?'green':i%3===2?'purple':'';return `<div class="mini-item"><span class="cycle ${cls}">${esc(displayBadge(d))}</span><div><div class="mini-title">${esc(d.task)}</div><div class="mini-desc">${esc(d.detail||niceDateLabel(d))}</div></div></div>`}
function situationHtml(d,i){const cls=i%3===0?'yellow':i%3===1?'green':'purple';return `<div class="situation-item"><span class="situation-icon ${cls}">⚡</span><div><div class="situation-title">${esc(d.task)}</div><div class="situation-desc">${esc(d.detail||niceDateLabel(d))}</div></div></div>`}
function showMore(type){const list=listFor(type);document.getElementById('monthly').scrollIntoView({behavior:'smooth',block:'start'});document.getElementById('monthly').innerHTML=`<div class="section-head"><div class="section-title">${type==='cycle'?'주기업무 전체':'상황업무 전체'} <span class="count-badge">${list.length}건</span></div><button class="pill-btn" id="back">월별업무로</button></div>${renderRows(list)}`;document.getElementById('back').onclick=()=>{renderTimeline();renderMonthly()};bindRows()}
function render(){renderSide();renderTimeline();renderMonthly();renderOther()}
document.querySelectorAll('[data-focus-search]').forEach(b=>b.onclick=()=>document.getElementById('search')?.focus());document.querySelectorAll('[data-jump]').forEach(b=>b.onclick=()=>document.getElementById(b.dataset.jump)?.scrollIntoView({behavior:'smooth',block:'start'}));
render();
</script>
</body>
</html>
